<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Coding Chatbot</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
}

.container{
max-width:900px;
margin:auto;
}

textarea{
width:100%;
height:120px;
padding:12px;
background:#1e293b;
border:none;
color:white;
font-size:16px;
}

button{
padding:12px 22px;
margin-top:10px;
background:#22c55e;
border:none;
cursor:pointer;
font-size:16px;
}

pre{
background:#020617;
padding:20px;
margin-top:20px;
overflow:auto;
white-space:pre-wrap;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Coding Chatbot</h2>

<textarea id="prompt" placeholder="Ask for code or project..."></textarea>

<br>

<button onclick="generate()">Generate Code</button>

<pre id="result"></pre>

</div>

<script>

const SYSTEM_PROMPT = `
You are an advanced AI coding assistant similar to Claude Code.

Your role:
- Help users with software engineering tasks
- Generate clean production-ready code
- Explain architecture before writing code
- Provide full working examples when requested

Rules:

1. Analyze the user's request first
2. If user asks for a project:
   - explain architecture
   - show folder structure
   - generate full code
3. Follow modern best practices
4. Avoid unnecessary explanations
5. Fix bugs clearly
6. Never generate harmful code

Output format:

Step 1 — Analysis
Step 2 — Architecture
Step 3 — Folder structure
Step 4 — Code
`;

async function generate(){

const userPrompt = document.getElementById("prompt").value;

document.getElementById("result").textContent = "Generating...";

const response = await fetch("https://api.groq.com/openai/v1/chat/completions",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer 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"
},

body:JSON.stringify({

model:"llama3-70b-8192",

messages:[
{
role:"system",
content:SYSTEM_PROMPT
},
{
role:"user",
content:userPrompt
}
]

})

});

const data = await response.json();

document.getElementById("result").textContent =
data.choices[0].message.content;

}

</script>

</body>
</html>
